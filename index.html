<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>ARASHI | Web制作実績</title>
<style>
  :root {
    --bg: #0b0b0d;
    --fg: #f2f2f0;
    --muted: #9a9a9a;
    --accent: #e8e6df;
    --line: #262626;
    --card-bg: #131315;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.7;
  }
  header {
    padding: 96px 24px 64px;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  header .brand {
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  header h1 {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 600;
    margin: 0 0 16px;
  }
  header p {
    color: var(--muted);
    max-width: 560px;
    margin: 0 auto;
    font-size: 15px;
  }
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 64px 24px 96px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 24px;
  }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .card h2 {
    font-size: 20px;
    font-weight: 600;
    margin: 0;
  }
  .card h2 a {
    color: var(--fg);
    text-decoration: none;
    border-bottom: 1px solid var(--muted);
  }
  .card h2 a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 24px;
    font-size: 13px;
    color: var(--muted);
  }
  .meta strong {
    color: var(--fg);
    font-weight: 500;
  }
  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .tag {
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 999px;
    color: var(--muted);
  }
  .desc {
    font-size: 14px;
    color: #cfcfcf;
    margin: 0;
  }
  footer {
    text-align: center;
    padding: 48px 24px 64px;
    color: var(--muted);
    font-size: 13px;
    border-top: 1px solid var(--line);
  }
  footer a {
    color: var(--fg);
  }
</style>
</head>
<body>

<header>
  <div class="brand">ARASHI</div>
  <h1>Web制作実績</h1>
</header>

<main>
  <div class="grid">

    <div class="card">
      <h2><a href="https://example.com" target="_blank" rel="noopener">サイト名A</a></h2>
      <div class="meta">
        <span><strong>役割</strong> ディレクション・コーディング</span>
      </div>
      <div class="tags">
        <span class="tag">WordPress</span>
        <span class="tag">JavaScript</span>
      </div>
      <p class="desc">〇〇業界のコーポレートサイト。事業成長を見据えたサイト構成を提案し、公開まで一気通貫で担当。</p>
    </div>

    <div class="card">
      <h2><a href="https://example2.com" target="_blank" rel="noopener">サイト名B</a></h2>
      <div class="meta">
        <span><strong>役割</strong> コーディング</span>
      </div>
      <div class="tags">
        <span class="tag">HTML/CSS</span>
        <span class="tag">GSAP</span>
      </div>
      <p class="desc">ブランドのLP制作。短納期案件で、外部パートナーと連携しながら公開日に納品。</p>
    </div>

  </div>
</main>

<footer>
  <p>ARASHI &mdash; Web制作事務所<br>
  お問い合わせ: <a href="mailto:r-tomono@web-arashi.com">r-tomono@web-arashi.com</a></p>
</footer>

</body>
</html>
